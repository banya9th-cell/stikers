<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        .a-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; position: absolute !important; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); color: #00ff00; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; cursor: pointer; text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div style="border: 2px solid #00ff00; padding: 15px 30px; font-weight: bold;">УВІМКНУТИ СКАНЕР</div>
        <p style="margin-top: 15px;">Наведи на стікер для аналізу</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-assets>
            <a-mixin id="scanner-frame" 
                line="start: -0.5 0.7 0; end: 0.5 0.7 0; color: #00ff00"
                line__2="start: -0.5 -0.7 0; end: 0.5 -0.7 0; color: #00ff00"
                line__3="start: -0.5 0.7 0; end: -0.5 -0.7 0; color: #00ff00"
                line__4="start: 0.5 0.7 0; end: 0.5 -0.7 0; color: #00ff00"></a-mixin>
        </a-assets>

        <script>
            for (let i = 0; i < 4; i++) {
                document.write(`
                    <a-entity class="ar-target" mindar-image-target="targetIndex: ${i}">
                        <a-entity mixin="scanner-frame"></a-entity>
                        <a-entity position="0 0.9 0.1">
                            <a-plane color="black" width="1.8" height="0.4" opacity="0.8"></a-plane>
                            <a-entity class="text-label" 
                                      text="value: СТАТУС...; align: center; width: 4; color: #00ff00; font: https://cdn.aframe.io/fonts/Roboto-msdf.json; negate: false">
                            </a-entity>
                        </a-entity>
                    </a-entity>
                `);
            }
        </script>

    </a-scene>

    <script>
        const phrases = [
            "ПОРУШНИК: БЕЗ КАСКИ!",
            "ОБ'ЄКТ БЕЗПЕЧНИЙ ✅",
            "ШТРАФ: 1000 ГРН 💸",
            "ДЕ ТВОЯ МАСКА? 😷",
            "СУПЕР-СПЕЦІАЛІСТ 👷",
            "ТИ КРАЩИЙ! ✨",
            "ЧАС ПИТИ КАВУ ☕",
            "ОБ'ЄКТ ПІД НАГЛЯДОМ 🕵️",
            "ОТРИМАЙ ПО РУКАХ! ✋"
        ];

        const overlay = document.getElementById('overlay');
        overlay.addEventListener('click', () => { overlay.style.display = 'none'; });

        const targets = document.querySelectorAll('.ar-target');
        targets.forEach(t => {
            t.addEventListener("targetFound", () => {
                const textEntity = t.querySelector('.text-label');
                const randomIndex = Math.floor(Math.random() * phrases.length);
                // Важливо міняти саме атрибут text
                textEntity.setAttribute('text', 'value', phrases[randomIndex]);
            });
        });
    </script>
</body>
</html>
