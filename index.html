<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        .a-canvas { width: 100% !important; height: 100% !important; position: absolute !important; top: 0; left: 0; z-index: 1; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); color: #00ff00; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; cursor: pointer; text-align: center; font-family: sans-serif;
        }

        #ar-status-panel {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.85); border: 3px solid #00ff00;
            color: #00ff00; padding: 20px; text-align: center;
            font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold;
            z-index: 50; display: none; box-shadow: 0 0 20px #00ff00; border-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div style="border: 2px solid #00ff00; padding: 20px; font-weight: bold;">ЗАПУСТИТИ AR-ОРАКУЛ</div>
        <p style="margin-top: 15px;">Наведи на стікер, щоб дізнатися долю</p>
    </div>

    <div id="ar-status-panel">АНАЛІЗУЮ КАРМУ...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
             embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <script>
            // Генеруємо таргет-зони для всіх 12 стікерів (індекси 0-11)
            for(let i=0; i<12; i++) {
                document.write(`
                    <a-entity mindar-image-target="targetIndex: ${i}" class="ar-target">
                        <a-entity line="start: -0.5 0.7 0; end: 0.5 0.7 0; color: #00ff00" 
                                  line__2="start: -0.5 -0.7 0; end: 0.5 -0.7 0; color: #00ff00" 
                                  line__3="start: -0.5 0.7 0; end: -0.5 -0.7 0; color: #00ff00" 
                                  line__4="start: 0.5 0.7 0; end: 0.5 -0.7 0; color: #00ff00"></a-entity>
                    </a-entity>
                `);
            }
        </script>
    </a-scene>

                "«Сьогодні ти зустрінеш свою долю. Головне — щоб ти її впізнав через комбінезон»",
                "«Твоя віра в себе — це круто, але гравітація вірить у себе сильніше. Злізь звідти!»",
                "«Сьогодні на тебе чекає несподіваний злет... і дуже швидке приземлення. Не забудь страхувальний пояс і канат.»",
                "«Найближчим часом ти доведеш, що уважність цінніша за швидкість.»"
            ],
            8: [ // 🚜 «Повезе не повезе»

                "«Твоя енергія сьогодні на висоті, але навіть восьми рук не вистачить, щоб розгребти всі твої задачі»",

        const overlay = document.getElementById('overlay');
        const statusPanel = document.getElementById('ar-status-panel');
        const targets = document.querySelectorAll('.ar-target');

        overlay.addEventListener('click', () => { overlay.style.display = 'none'; });

        targets.forEach((t, index) => {
            t.addEventListener("targetFound", () => {
                const currentPhrases = predictions[index] || ["Твоя доля ще не написана в НПАОП..."];
                const randomIndex = Math.floor(Math.random() * currentPhrases.length);
                statusPanel.innerText = currentPhrases[randomIndex];
                statusPanel.style.display = 'block';
            });
            t.addEventListener("targetLost", () => {
                statusPanel.style.display = 'none';
            });
        });
    </script>
</body>
</html>
